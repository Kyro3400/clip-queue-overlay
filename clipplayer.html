<!DOCTYPE html>
<html>
<body style="margin:0; background:black;">
<iframe 
  id="player"
  width="100%" 
  height="100%" 
  frameborder="0"
  allowfullscreen="true"
  scrolling="no"
  allow="autoplay; fullscreen">
</iframe>

<script>
let queue = [];
let playing = false;

console.log("Overlay loaded");

// 🔌 WebSocket connection to Streamer.bot
function connectSocket() {
    let socket = new WebSocket("ws://localhost:8080/");

    socket.onopen = () => {
        console.log("WebSocket connected");
    };

    socket.onclose = () => {
        console.log("WebSocket disconnected... retrying");
        setTimeout(connectSocket, 2000);
    };

    socket.onerror = (err) => {
        console.log("WebSocket error:", err);
    };

    socket.onmessage = function(event) {
        console.log("Received:", event.data);

        let data = JSON.parse(event.data);

        if (data.clip) {
            queue.push(data.clip);
            if (!playing) playNext();
        }

        if (data.skip) {
            playNext();
        }
    };
}

connectSocket();

// 🎬 Convert Twitch clip URL → embed URL
function convertClip(url) {
    try {
        let match = url.match(/clip\/([A-Za-z0-9\-_]+)/);

        if (!match) {
            match = url.match(/clips\.twitch\.tv\/([A-Za-z0-9\-_]+)/);
        }

        if (!match) {
            console.log("Could not extract clip ID from:", url);
            return null;
        }

        let clipId = match[1].trim();

        // ✅ THIS FIXES THE TWITCH BLOCKING ISSUE
        let parent = window.location.hostname;

        let embed = "https://clips.twitch.tv/embed?clip=" + clipId + "&parent=" + parent;

        console.log("Embed URL:", embed);

        return embed;

    } catch (e) {
        console.log("Convert error:", e);
        return null;
    }
}

// ▶️ Play queue
function playNext() {
    if (queue.length === 0) {
        playing = false;
        return;
    }

    playing = true;

    let next = queue.shift();
    console.log("Playing:", next);

    let embed = convertClip(next);

    if (!embed) {
        console.log("Invalid clip, skipping");
        playNext();
        return;
    }

    document.getElementById("player").src = embed;

    setTimeout(playNext, 15000);
}
</script>
</body>
</html>
